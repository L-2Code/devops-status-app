name: CI Pipeline

# Wann die Pipeline ausgelöst wird
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend  # alle Befehle im Backend-Ordner

    steps:
      # Repo auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # Node-Version setzen
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Dependencies installieren
      - name: Install dependencies
        run: npm ci

      # Linting (Codequalität)
      - name: Run lint
        run: npm run lint

      # Tests ausführen
      - name: Run tests
        run: npm test

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: backend-checks  # läuft erst nach erfolgreichem ersten Job

    # Repo auschecken
    steps:  
      - name: Checkout
        uses: actions/checkout@v4

      # Docker Container bauen
      - name: Build containers
        run: docker compose build

      # Stack starten
      - name: Start stack
        run: docker compose up -d

      # Backend testen
      - name: Check backend
        run: curl --fail http://localhost:3000/health

      # Frontend testen
      - name: Check frontend
        run: curl --fail http://localhost:8080

      # Stack stoppen (auch bei Fehlern)
      - name: Stop stack
        if: always()
        run: docker compose down