name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Node installieren
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Backend Dependencies installieren
        run: |
          cd backend
          npm install

      - name: Backend starten testen
        run: |
          cd backend
          node server.js &
          sleep 3
          curl http://localhost:3000/api/status

      - name: Docker Build testen
        run: docker compose build