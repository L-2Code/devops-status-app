name: CI Pipeline

# Wann die Pipeline ausgelöst wird
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend  # alle Befehle im Backend-Ordner

    steps:
      # Repo auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # Node-Version setzen
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Dependencies installieren
      - name: Install dependencies
        run: npm ci

      # Linting (Codequalität)
      - name: Run lint
        run: npm run lint

      # Tests ausführen
      - name: Run tests
        run: npm test

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: backend-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Show container status
        run: docker compose ps

      # WICHTIG: warten bis Backend wirklich ready ist
      - name: Wait for backend
        run: |
          for i in {1..10}; do
            curl --fail http://localhost:3000/health && exit 0
            echo "Backend not ready yet, retrying..."
            sleep 2
          done
          echo "Backend did not start in time"
          exit 1

      - name: Check backend status endpoint
        run: curl --fail http://localhost:3000/api/status

      - name: Check frontend
        run: curl --fail http://localhost:8080

      # Logs IMMER anzeigen (extrem wichtig für Debugging)
      - name: Show logs
        if: always()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down